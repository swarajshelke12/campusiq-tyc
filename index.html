<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
    <meta name="theme-color" content="#F8F7F4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>TY-C &middot; CampusIQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── RESET + ROOT ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #F8F7F4;
            --surface: #FFFFFF;
            --surface2: #F2F1EE;
            --ink: #0D0D0D;
            --ink2: #6B6460;
            --ink3: #B8B4AF;
            --line: rgba(13, 13, 13, 0.07);
            --line2: rgba(13, 13, 13, 0.11);
            --safe-b: env(safe-area-inset-bottom, 0px);
            --safe-t: env(safe-area-inset-top, 0px);
        }

        html {
            background: var(--bg);
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Geist', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        /* ── HEADER ── */
        .hdr {
            position: sticky;
            top: 0;
            z-index: 400;
            padding-top: var(--safe-t);
            background: rgba(248, 247, 244, 0.85);
            backdrop-filter: blur(20px) saturate(1.8);
            -webkit-backdrop-filter: blur(20px) saturate(1.8);
            border-bottom: 1px solid var(--line);
        }

        .hdr-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            height: 52px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-mark {
            width: 30px;
            height: 30px;
            background: var(--ink);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 0.62rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: var(--bg);
        }

        .logo-text {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        .logo-tag {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            background: var(--surface2);
            border: 1px solid var(--line2);
            border-radius: 5px;
            padding: 0.14rem 0.44rem;
            color: var(--ink2);
            text-transform: uppercase;
        }

        .hdr-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--ink);
            color: var(--bg);
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            border-radius: 99px;
            padding: 0.28rem 0.65rem;
            text-transform: uppercase;
        }

        .ldot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2.2s ease infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5);
            }

            55% {
                opacity: 0.3;
                box-shadow: 0 0 0 5px rgba(74, 222, 128, 0);
            }
        }

        .clk {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--ink2);
            background: var(--surface2);
            border: 1px solid var(--line2);
            border-radius: 7px;
            padding: 0.24rem 0.55rem;
        }

        /* ── MAIN SCROLL ── */
        .main {
            padding: 0.85rem 0.9rem calc(5.6rem + var(--safe-b));
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        /* ── HERO CARD ── */
        .hero {
            background: var(--ink);
            border-radius: 20px;
            padding: 1.2rem 1.2rem 0;
            position: relative;
            overflow: hidden;
        }

        #heroOrb {
            position: absolute;
            inset: 0;
            pointer-events: none;
            transition: background 0.9s ease;
        }

        .hero-top {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.8rem;
        }

        .hero-left {
            flex: 1;
            min-width: 0;
        }

        .hero-eyebrow {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 0.35rem;
        }

        .hero-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.08;
            color: #FFFFFF;
            margin-bottom: 0.55rem;
            word-break: break-word;
        }

        .hero-sub {
            font-size: 0.72rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.5;
        }

        /* ring */
        .ring-box {
            flex-shrink: 0;
            position: relative;
            width: 64px;
            height: 64px;
        }

        .ring-svg {
            display: block;
            transform: rotate(-90deg);
        }

        .ring-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.06);
            stroke-width: 4.5;
        }

        #hProg {
            fill: none;
            stroke: #FFFFFF;
            stroke-width: 4.5;
            stroke-linecap: round;
            stroke-dasharray: 163.4;
            stroke-dashoffset: 163.4;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.7s ease;
        }

        .ring-label {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .ring-pct {
            font-size: 0.82rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .ring-sub {
            font-size: 0.42rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 1px;
        }

        /* next strip */
        .hero-nxt {
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            padding: 0.58rem 0;
            margin-top: 0.85rem;
            display: none;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.68rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.35);
        }

        .nxt-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #F59E0B;
            flex-shrink: 0;
        }

        .hero-nxt b {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        /* ── LEGEND ── */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.22rem 0.6rem;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 0.6rem 0.85rem;
        }

        .leg {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .ldl {
            width: 6px;
            height: 6px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .ltx {
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--ink2);
        }

        /* ── DAY TABS ── */
        .tabs-wrap {
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            margin: 0 -0.9rem;
            padding: 0 0.9rem;
        }

        .tabs-wrap::-webkit-scrollbar {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 0.3rem;
            min-width: max-content;
        }

        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 0.48rem 0.85rem;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 11px;
            cursor: pointer;
            color: var(--ink3);
            transition: all 0.15s ease;
            user-select: none;
        }

        .tab:active {
            transform: scale(0.91);
        }

        .tab-on {
            background: var(--ink);
            border-color: var(--ink);
            color: #fff;
        }

        .tab-today:not(.tab-on) {
            border-color: rgba(255, 87, 51, 0.4);
            color: var(--ink2);
        }

        .tab-d {
            font-size: 0.78rem;
            font-weight: 700;
            line-height: 1;
        }

        .tab-dt {
            font-size: 0.56rem;
            font-weight: 500;
            opacity: 0.65;
            line-height: 1;
        }

        /* ── SCHEDULE ── */
        .sched {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .row {
            display: grid;
            grid-template-columns: 52px 1fr;
            gap: 0.4rem;
            align-items: stretch;
            opacity: 0;
            animation: rowIn 0.28s ease forwards;
        }

        @keyframes rowIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .tcol {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            gap: 1px;
        }

        .t1 {
            font-size: 0.64rem;
            font-weight: 600;
            color: var(--ink2);
        }

        .t2 {
            font-size: 0.56rem;
            font-weight: 500;
            color: var(--ink3);
        }

        /* ── CARDS ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

        /* class card */
        .card-cls {
            padding: 0.82rem 0.95rem 0.82rem 1.1rem;
            border-left: 3px solid var(--ac, var(--ink3));
        }

        .card-cls.card-now {
            border-color: var(--ac, var(--ink3));
        }

        .now-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ac, var(--ink2));
            margin-bottom: 0.3rem;
        }

        .npulse {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.8s ease infinite;
        }

        .cls-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.26rem;
        }

        .cls-code {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--ac, var(--ink3));
            letter-spacing: 0.04em;
        }

        .cls-room {
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--ink2);
            background: var(--surface2);
            border: 1px solid var(--line2);
            border-radius: 6px;
            padding: 0.1rem 0.38rem;
        }

        .cls-name {
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: -0.015em;
            color: var(--ink);
            line-height: 1.2;
            margin-bottom: 0.2rem;
        }

        .cls-prof {
            font-size: 0.64rem;
            font-weight: 500;
            color: var(--ink3);
        }

        /* batch card */
        .card-batch {
            border-left: 3px solid var(--ac, var(--ink3));
        }

        .batch-hd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.44rem 0.95rem 0.4rem 1.1rem;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink3);
            border-bottom: 1px solid var(--line);
        }

        .now-tag {
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--ac, var(--ink2));
            border: 1px solid currentColor;
            border-radius: 4px;
            padding: 0.07rem 0.28rem;
        }

        .brows {
            display: flex;
            flex-direction: column;
        }

        .brow {
            display: grid;
            grid-template-columns: 28px 1fr auto;
            gap: 0.45rem;
            align-items: center;
            padding: 0.54rem 0.95rem 0.54rem 1.1rem;
            border-bottom: 1px solid var(--line);
        }

        .brow:last-child {
            border-bottom: none;
        }

        .blb {
            font-size: 0.6rem;
            font-weight: 800;
            text-align: center;
            border: 1.5px solid;
            border-radius: 5px;
            padding: 0.1rem 0;
            line-height: 1.4;
        }

        .binfo {}

        .bname {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--ink);
            line-height: 1.2;
        }

        .bprof {
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--ink3);
            margin-top: 1px;
        }

        .broom {
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--ink2);
            background: var(--surface2);
            border: 1px solid var(--line2);
            border-radius: 6px;
            padding: 0.1rem 0.38rem;
            white-space: nowrap;
            align-self: center;
        }

        /* specials */
        .card-free,
        .card-break,
        .card-lib {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 0.95rem;
            border: 1.5px dashed var(--line2);
            background: transparent;
        }

        .card-break {
            background: rgba(245, 158, 11, 0.04);
            border-color: rgba(245, 158, 11, 0.2);
        }

        .card-lib {
            background: rgba(14, 165, 233, 0.04);
            border-color: rgba(14, 165, 233, 0.2);
        }

        .free-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        .free-txt {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--ink2);
        }

        /* ── CHAT ── */
        .chat {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65dvh;
            z-index: 500;
            background: var(--surface);
            border: 1px solid var(--line2);
            border-bottom: none;
            border-radius: 22px 22px 0 0;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.36s cubic-bezier(0.34, 1.15, 0.52, 1);
            box-shadow: 0 -8px 40px rgba(13, 13, 13, 0.12);
        }

        .chat.open {
            transform: translateY(0);
        }

        .drag-handle {
            width: 38px;
            height: 4px;
            border-radius: 2px;
            background: var(--line2);
            margin: 0.7rem auto 0.15rem;
            flex-shrink: 0;
            cursor: pointer;
        }

        .chat-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1rem 0.65rem;
            border-bottom: 1px solid var(--line);
            flex-shrink: 0;
        }

        .chat-who {
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }

        .chat-av {
            width: 34px;
            height: 34px;
            background: var(--ink);
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--bg);
            letter-spacing: -0.01em;
        }

        .chat-name {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--ink);
        }

        .chat-st {
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--ink3);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 1px;
        }

        .stgreen {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #4ade80;
        }

        .chat-x {
            width: 28px;
            height: 28px;
            background: var(--surface2);
            border: 1px solid var(--line2);
            border-radius: 8px;
            cursor: pointer;
            color: var(--ink2);
            font-size: 0.7rem;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .msgs {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            scroll-behavior: smooth;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 87%;
            animation: msgIn 0.2s ease both;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .msg-u {
            align-self: flex-end;
        }

        .msg-b {
            align-self: flex-start;
        }

        .mbody {
            padding: 0.65rem 0.9rem;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 500;
            line-height: 1.65;
        }

        .msg-u .mbody {
            background: var(--ink);
            color: var(--bg);
            border-bottom-right-radius: 3px;
        }

        .msg-b .mbody {
            background: var(--surface2);
            border: 1px solid var(--line2);
            color: var(--ink);
            border-bottom-left-radius: 3px;
        }

        .mtime {
            font-size: 0.54rem;
            font-weight: 500;
            color: var(--ink3);
            margin-top: 3px;
            padding: 0 2px;
        }

        .msg-u .mtime {
            text-align: right;
        }

        .qchips {
            display: flex;
            gap: 0.28rem;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 0.48rem 0.9rem;
            border-top: 1px solid var(--line);
            flex-shrink: 0;
        }

        .qchips::-webkit-scrollbar {
            display: none;
        }

        .qchip {
            flex-shrink: 0;
            padding: 0.3rem 0.68rem;
            border: 1.5px solid var(--line2);
            background: var(--bg);
            border-radius: 99px;
            font-size: 0.64rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            color: var(--ink2);
            transition: all 0.12s;
        }

        .qchip:active {
            background: var(--ink);
            color: var(--bg);
            border-color: var(--ink);
        }

        .chat-inp {
            padding: 0.6rem 0.9rem calc(0.6rem + var(--safe-b));
            border-top: 1px solid var(--line);
            flex-shrink: 0;
        }

        .inp-row {
            display: flex;
            align-items: center;
            gap: 0.38rem;
            background: var(--surface2);
            border: 1.5px solid var(--line2);
            border-radius: 12px;
            padding: 0.28rem 0.28rem 0.28rem 0.78rem;
            transition: border-color 0.18s;
        }

        .inp-row:focus-within {
            border-color: var(--ink);
        }

        #ci {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--ink);
            padding: 0.35rem 0;
            font-family: inherit;
        }

        #ci::placeholder {
            color: var(--ink3);
        }

        .send {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            border: none;
            background: var(--ink);
            color: var(--bg);
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 1rem;
            flex-shrink: 0;
            transition: all 0.13s;
        }

        .send:active {
            background: #FF5733;
            transform: scale(0.87);
        }

        /* ── FAB ── */
        .fab {
            position: fixed;
            bottom: calc(1.25rem + var(--safe-b));
            right: 1.25rem;
            z-index: 400;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            border: none;
            background: var(--ink);
            color: var(--bg);
            display: grid;
            place-items: center;
            cursor: pointer;
            font-size: 1.15rem;
            box-shadow: 0 4px 16px rgba(13, 13, 13, 0.22), 0 12px 40px rgba(13, 13, 13, 0.12);
            transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .fab:active {
            transform: scale(0.86);
        }

        /* ── DESKTOP ── */
        @media(min-width:900px) {
            body {
                height: 100dvh;
                overflow: hidden;
                display: grid;
                grid-template-rows: 52px 1fr;
                grid-template-columns: 1fr 380px;
            }

            .hdr {
                grid-column: 1/-1;
            }

            .page {
                grid-column: 1;
                height: 100%;
                overflow-y: auto;
            }

            .chat {
                position: static;
                height: 100%;
                transform: none !important;
                border-radius: 0;
                border-top: none;
                border-bottom: none;
                border-left: 1px solid var(--line);
                border-right: none;
                box-shadow: none;
                grid-column: 2;
            }

            .drag-handle,
            .chat-x {
                display: none;
            }

            .fab {
                display: none !important;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="hdr">
        <div class="hdr-inner">
            <div class="logo">
                <div class="logo-mark">IQ</div>
                <span class="logo-text">CampusIQ</span>

        function $$(id) { try { return document.getElementById(id); } catch (e) { return null; } }
        function today() { try { return new Date().toLocaleDateString('en-US', { weekday: 'long' }); } catch (e) { return 'Monday'; } }
        function nowM() { try { const d = new Date(); return d.getHours() * 60 + d.getMinutes(); } catch (e) { return 0; } }
        function toM(t) { try { if (!t) return 0; const [h, m] = t.split(':').map(Number); return (h || 0) * 60 + (m || 0); } catch (e) { return 0; } }
        function fmt(t) { try { if (!t) return ''; const [h, m] = t.split(':').map(Number); const ap = h < 12 ? 'AM' : 'PM', hh = h > 12 ? h - 12 : h === 0 ? 12 : h; return hh + ':' + (m || 0).toString().padStart(2, '0') + ' ' + ap; } catch (e) { return t; } }

        // subject accent colours
        const COLS = { mgt: '#FF5733', mal: '#7C3AED', sft: '#0EA5E9', mad: '#F59E0B', eti: '#10B981', css: '#EC4899', cpe: '#06B6D4' };
        const COLSBG = { mgt: 'rgba(255,87,51,0.08)', mal: 'rgba(124,58,237,0.08)', sft: 'rgba(14,165,233,0.08)', mad: 'rgba(245,158,11,0.08)', eti: 'rgba(16,185,129,0.08)', css: 'rgba(236,72,153,0.08)', cpe: 'rgba(6,182,212,0.08)' };
        function ckey(code) { if (!code) return ''; const c = code.toLowerCase(); for (const k of Object.keys(COLS)) if (c.includes(k)) return k; return ''; }
        function col(code) { const k = ckey(code); return k ? COLS[k] : '#94a3b8'; }
        function colbg(code) { const k = ckey(code); return k ? COLSBG[k] : 'rgba(148,163,184,0.06)'; }
        function acls(code) { const k = ckey(code); return k ? 'ac-' + k : ''; }

        // now / next helpers
        function curRow(day) { const n = nowM(); for (const r of (SCH[day] || [])) { if (n >= toM(r.t) && n < toM(r.e)) return { row: r, pct: Math.round((n - toM(r.t)) / (toM(r.e) - toM(r.t)) * 100) }; } return null; }
        function nxtCls(day) { const n = nowM(); for (const r of (SCH[day] || [])) { if (toM(r.t) > n) { const s = r.slots[0]; if (s && (s.tp === 'cls' || s.tp === 'batch')) return { row: r, s }; } } return null; }
        function allEntries() { const a = []; for (const [day, rows] of Object.entries(SCH)) for (const row of rows) for (const s of row.slots) { if (s.tp === 'cls') a.push({ day, row, sl: s }); if (s.tp === 'batch' && s.batches) s.batches.forEach(b => a.push({ day, row, sl: b })); } return a; }

        // ── CLOCK

        // ── HERO UPDATE
        function updateHero() {
            try {
                const td = today(), cr = curRow(td), C = 2 * Math.PI * 26; // r=26 => circumference=163.4
                const titleEl = $$('hTitle'), subEl = $$('hSub'), progEl = $$('hProg'), pctEl = $$('hPct'), nxtEl = $$('hNxt');
                if (!titleEl) return;

                // ── decide what's on right now
                let label = '', sub = '', accentCol = '#94a3b8', pct = 0, showRing = false;
                if (!cr) {
                    label = 'No class right now';
                    sub = td + ' · Check your next class below';
                } else {
                    showRing = true; pct = cr.pct;
                    const s = cr.row.slots[0];
                    if (s.tp === 'cls') { label = s.name; sub = s.code + ' · ' + s.room + ' · ' + s.prof + ' · ' + fmt(cr.row.t) + '–' + fmt(cr.row.e); accentCol = col(s.code); }
                    else if (s.tp === 'batch') { label = 'Batch Practicals'; sub = fmt(cr.row.t) + '–' + fmt(cr.row.e); accentCol = '#0EA5E9'; }
                    else if (s.tp === 'break') { label = 'Lunch Break 🍴'; sub = fmt(cr.row.t) + '–' + fmt(cr.row.e) + ' · Enjoy!'; accentCol = '#F59E0B'; }
                    else if (s.tp === 'lib') { label = 'Library Hour 📚'; sub = fmt(cr.row.t) + '–' + fmt(cr.row.e); accentCol = '#0EA5E9'; }
                    else { label = 'Free Period 🌿'; sub = fmt(cr.row.t) + '–' + fmt(cr.row.e) + ' · You’re free!'; }
                }
                titleEl.textContent = label;
                if (subEl) subEl.textContent = sub;

                // ring
                const ring = $$('hRing');
                if (ring) {
                    const circ = 163.4;
                    if (showRing) {
                        ring.style.strokeDashoffset = circ * (1 - pct / 100);
                        ring.style.stroke = accentCol;
                    } else {
                        ring.style.strokeDashoffset = circ;
                        ring.style.stroke = 'rgba(0,0,0,0.06)';
                    }
                }
                if (pctEl) pctEl.textContent = showRing ? pct + '%' : '';

                // glow orb color
                const orb = $$('heroOrb');
                if (orb) { const rgb = accentCol.replace('#', ''); const r = parseInt(rgb.slice(0, 2), 16), g = parseInt(rgb.slice(2, 4), 16), b = parseInt(rgb.slice(4, 6), 16); orb.style.background = 'radial-gradient(circle at 70% 30%, rgba(' + r + ',' + g + ',' + b + ',0.18) 0%, transparent 65%)'; }

                // next class bar
                const nx = nxtCls(td);
                if (nxtEl) {
                    if (nx) { const nm = nx.s.tp === 'cls' ? nx.s.name : 'Batch Practicals'; nxtEl.innerHTML = '<span class="nxt-dot"></span>Up next — <b>' + nm + '</b> at ' + fmt(nx.row.t); nxtEl.style.display = 'flex'; }

        // ── TABS + SCHEDULE
        let AD = 'Monday';
        function renderTabs() {
            try {
                const w = $$('tabWrap'); if (!w) return;
                w.innerHTML = '';
                const td = today();
                DAYS.forEach((d, i) => {
                    const b = document.createElement('button');
                    const isActive = d === AD, isToday = d === td && !isActive;
                    b.className = 'tab' + (isActive ? ' tab-on' : '') + (isToday ? ' tab-today' : '');

                    w.appendChild(b);

        function renderSched(day) {
            try {
                const w = $$('schedWrap'); if (!w) return;
                w.innerHTML = '';
                const td = today(), n = nowM();
                (SCH[day] || []).forEach((row, ri) => {
                    const isNow = day === td && n >= toM(row.t) && n < toM(row.e);

                    wrap.className = 'row';
                    wrap.style.animationDelay = (ri * 0.05) + 's';

                    // time col
                    const tc = document.createElement('div');
                    tc.className = 'tcol';
                    tc.innerHTML = '<span class="t1">' + fmt(row.t) + '</span><span class="t2">' + fmt(row.e) + '</span>';
                    wrap.appendChild(tc);

                    // card col
                    const cc = document.createElement('div');
                    row.slots.forEach(s => {

                            el = document.createElement('div');

                            el.style.setProperty('--ac', col(s.code));
                            el.style.setProperty('--abg', colbg(s.code));
                            if (isNow) el.style.background = colbg(s.code);

                                '<div class="cls-name">' + s.name + '</div>' +
                                '<div class="cls-prof">' + s.prof + '</div>';
                        } else if (s.tp === 'batch' && s.batches) {
                            el = document.createElement('div');
                            el.className = 'card card-batch' + (isNow ? ' card-now' : '');
                            const firstCode = s.batches[0] ? s.batches[0].code : '';
                            el.style.setProperty('--ac', col(firstCode));
                            el.style.setProperty('--abg', colbg(firstCode));
                            if (isNow) el.style.background = colbg(firstCode);

                    const s = cr.row.slots[0];
                    if (s.tp === 'cls') return '📖 <b>' + s.name + '</b><br><small>' + s.code + ' &middot; Room ' + s.room + ' &middot; ' + s.prof + '<br>' + fmt(cr.row.t) + '–' + fmt(cr.row.e) + '</small>';
                    if (s.tp === 'batch') return '⚡️ <b>Batch Practicals</b> right now!<br>' + (s.batches || []).map(b => '<small>• ' + b.lb + ': ' + b.name + ' &mdash; ' + b.room + '</small>').join('<br>');
                    if (s.tp === 'break') return '🍴 <b>Lunch Break</b> right now.<br><small>' + fmt(cr.row.t) + '–' + fmt(cr.row.e) + ' &middot; Enjoy!</small>';
                    return '📚 <b>Library Hour</b> right now.<br><small>' + fmt(cr.row.t) + '–' + fmt(cr.row.e) + '</small>';
                }
                if (/next|after|upcoming/.test(q)) {
                    const nx = nxtCls(td); if (!nx) return 'No more classes today! 🌙 You’re done!';
                    if (nx.s.tp === 'batch') return '⚡️ <b>Batch Practicals</b> at <b>' + fmt(nx.row.t) + '</b><br>' + (nx.s.batches || []).map(b => '<small>• ' + b.lb + ': ' + b.name + ' &mdash; ' + b.room + '</small>').join('<br>');
                    return '🕒 <b>' + nx.s.name + '</b> at <b>' + fmt(nx.row.t) + '</b><br><small>' + nx.s.room + ' &middot; ' + nx.s.prof + '</small>';
                }
                if (/lunch|break/.test(q)) { const d = dayQ() || td, rs = (SCH[d] || []).filter(r => r.slots[0] && r.slots[0].tp === 'break'); if (!rs.length) return 'No lunch break on ' + d + '?? Check the schedule!'; return '🍴 <b>Lunch</b> on ' + d + '<br><b>' + fmt(rs[0].t) + '–' + fmt(rs[0].e) + '</b>'; }
                if (/free|gap|no class/.test(q)) { const d = dayQ() || td, fr = (SCH[d] || []).filter(r => r.slots[0] && r.slots[0].tp === 'free'); if (!fr.length) return 'No free periods on ' + d + '. Busy day!'; return '🟢 Free slots on <b>' + d + '</b>:<br>' + fr.map(r => '<small>• ' + fmt(r.t) + '–' + fmt(r.e) + '</small>').join('<br>'); }
                if (/end|finish|over|done|last/.test(q)) { const d = dayQ() || td, rs = (SCH[d] || []).filter(r => r.slots.some(s => s.tp === 'cls' || s.tp === 'batch')); if (!rs.length) return 'No classes on ' + d + '!'; return '🏁 Classes end at <b>' + fmt(rs[rs.length - 1].e) + '</b> on ' + d + '!'; }
                const sub = subQ();
                if (sub) { const hits = all.filter(e => ((e.sl && e.sl.code) || '').toUpperCase() === sub.code); if (!hits.length) return 'No ' + sub.name + ' found in TY-C schedule.'; const u = [...new Map(hits.map(e => [e.day + e.row.t, e])).values()]; return '📚 <b>' + sub.name + '</b> (' + sub.code + ')<br><br>' + u.map(e => '📅 <b>' + e.day + '</b>: ' + fmt(e.row.t) + '–' + fmt(e.row.e) + ', ' + (e.sl.room || '') + ', ' + (e.sl.prof || '')).join('<br>'); }
                const dq = dayQ();
                if (dq) { const rs = SCH[dq] || []; if (!rs.length) return 'Nothing on ' + dq + '.'; const L = []; rs.forEach(r => r.slots.forEach(s => { if (s.tp === 'cls') L.push('<small>• ' + fmt(r.t) + ': <b>' + s.name + '</b> &mdash; ' + s.room + '</small>'); else if (s.tp === 'batch') L.push('<small>• ' + fmt(r.t) + ': Batch — ' + (s.batches || []).map(b => b.lb + ': ' + b.name).join(', ') + '</small>'); else if (s.tp === 'break') L.push('<small>• ' + fmt(r.t) + ': 🍴 ' + (s.name || 'Lunch') + '</small>'); else if (s.tp === 'lib') L.push('<small>• ' + fmt(r.t) + ': 📚 Library HR</small>'); })); return '📅 <b>' + dq + '</b><br>' + L.join('<br>'); }
                if (/today|schedule/.test(q)) { const rs = SCH[td] || []; if (!rs.length) return 'No classes today!'; const L = []; rs.forEach(r => r.slots.forEach(s => { if (s.tp === 'cls') L.push('<small>• ' + fmt(r.t) + ': <b>' + s.name + '</b> &mdash; ' + s.room + '</small>'); else if (s.tp === 'batch') L.push('<small>• ' + fmt(r.t) + ': Batch Practicals</small>'); else if (s.tp === 'break') L.push('<small>• ' + fmt(r.t) + ': 🍴 ' + (s.name || 'Lunch') + '</small>'); })); return '📅 <b>Today — ' + td + '</b><br>' + L.join('<br>'); }
                if (/^(hi|hey|hello|yo|sup|goods*(morning|afternoon|evening))[\s!.]*$/.test(q)) { const nx = nxtCls(td); return (h < 12 ? 'Good morning 🌅' : h < 17 ? 'Hey 👋' : 'Good evening 🌙') + '! I’m Schedula, your TY-C assistant.' + (nx ? '<br><small>Next: <b>' + (nx.s.tp === 'cls' ? nx.s.name : 'Batch Practicals') + '</b> at ' + fmt(nx.row.t) + '</small>' : '<br><small>No more classes today!</small>'); }
                return 'Ask me:<br><small>• "What class now?"<br>• "When is MAL?"<br>• "Wednesday schedule?"<br>• "When is lunch?"<br>• "What time do we finish?"</small>';
            } catch (e) { console.warn(e); return 'Oops! Try asking again.'; }
        }

        function addMsg(r, html) {
            try {
                const c = $$('msgs'); if (!c) return;
                const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
                const d = document.createElement('div'); d.className = 'msg msg-' + r;
                d.innerHTML = '<div class="mbody">' + html + '</div><div class="mtime">' + t + '</div>';
                c.appendChild(d); c.scrollTop = c.scrollHeight;
            } catch (e) { }
        }
        function send() {
            try {
                const i = $$('ci'); if (!i) return;
                const t = (i.value || '').trim(); if (!t) return;
                i.value = ''; addMsg('u', t);
                setTimeout(() => { try { addMsg('b', chatReply(t)); } catch (e) { addMsg('b', 'Oops! Try again.'); } }, 110);
            } catch (e) { }
        }
        function ask(q) { try { const i = $$('ci'); if (i) i.value = q; send(); openChat(); } catch (e) { } }
        function openChat() { try { if (window.innerWidth >= 900) return; const p = $$('chat'), f = $$('fab'); if (p) p.classList.add('open'); if (f) f.style.display = 'none'; } catch (e) { } }
        function closeChat() { try { if (window.innerWidth >= 900) return; const p = $$('chat'), f = $$('fab'); if (p) p.classList.remove('open'); if (f) f.style.display = 'grid'; } catch (e) { } }

        // swipe down to close
        (function () {
            try {
                const p = $$('chat'); if (!p) return;
                let sy = 0, ok = false;
                p.addEventListener('touchstart', e => { sy = e.touches[0].clientY; ok = true; }, { passive: true });
                p.addEventListener('touchmove', e => { if (!ok) return; const dy = e.touches[0].clientY - sy; if (dy > 0) p.style.transform = 'translateY(' + dy + 'px)'; }, { passive: true });
                p.addEventListener('touchend', e => { ok = false; p.style.transform = ''; if (e.changedTouches[0].clientY - sy > 60) closeChat(); });
            } catch (e) { }
        })();

        function init() {
            try {
                const td = today();
                AD = DAYS.includes(td) ? td : 'Monday';
                renderTabs(); renderSched(AD); updateHero(); tick();
                setInterval(updateHero, 60000); setInterval(tick, 10000);
                if (window.innerWidth >= 900) { const p = $$('chat'); if (p) p.classList.add('open'); }
                const h = new Date().getHours(), nx = nxtCls(td);
                addMsg('b', (h < 12 ? 'Good morning 🌅' : h < 17 ? 'Hey there 👋' : 'Good evening 🌙') + '! I’m <b>Schedula</b>, your TY-C assistant.<br>' + (nx ? '<small>Next: <b>' + (nx.s.tp === 'cls' ? nx.s.name : 'Batch Practicals') + '</b> at ' + fmt(nx.row.t) + '</small>' : '<small>No more classes today!</small>'));
            } catch (e) { console.error(e); }
        }
        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { init(); }

    </script>
</body>
